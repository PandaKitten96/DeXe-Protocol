name: "test-smart-contracts"

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - dev

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install packages
        run: npm install

      - name: Lint Solidity
        run: npx solhint "contracts/**/*.sol"

      - name: Lint formatting
        run: npx prettier --check "contracts/**/*.sol" "./**/*.js" "./*.json" --ignore-path .gitignore

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install packages
        run: npm install

      - name: Run tests
        run: npm run test

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install packages
        run: npm install

      - name: Run coverage
        run: npm run coverage
